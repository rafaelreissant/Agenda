services:
  database:
    image: postgres:16
    container_name: agenda-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: agenda
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: